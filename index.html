<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="description" content="Promptlibrary - 바로 쓸 수 있는 실전 AI 프롬프트 모음" />
      <title>Promptlibrary | AI 프롬프트</title>
      <link rel="preconnect" href="https://fonts.googleapis.com" />
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
      <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
      <link rel="stylesheet" href="style.css" />
  </head>
    <body>
      <div class="page" id="page">
        <!-- Global Nav -->
        <nav class="global-nav" id="global-nav">
          <div class="global-nav__inner">
                <span class="global-nav__title" onclick="window.location.reload();">Promptlibrary</span>
                <div class="global-nav__links">
                  <button class="global-nav__link is-active" data-view="float" id="nav-float">대시보드</button>
                  <button class="global-nav__link" data-view="list" id="nav-list">리스트</button>
                  <button class="global-nav__link" data-view="library" id="nav-library">라이브러리</button>
                </div>
                <div class="global-nav__auth">
                  <button class="nav-login-btn" id="nav-login-btn">로그인</button>
                  <div class="nav-user-info hidden" id="nav-user-info">
                    <span class="nav-user-badge" id="nav-user-badge"></span>
                    <button class="nav-logout-btn" id="nav-logout-btn">로그아웃</button>
                  </div>
                </div>
              </div>
        </nav>

        <!-- Floating Canvas -->
        <main class="canvas" id="canvas">
          <div class="canvas__bg" aria-hidden="true"></div>
        </main>

        <!-- List View -->
        <section class="list-view hidden" id="list-view">
          <div class="list-view__header">
            <div class="list-view__filters">
              <button class="filter-pill is-active" data-sort="newest" id="filter-newest">최신순</button>
              <button class="filter-pill" data-sort="oldest" id="filter-oldest">오래된순</button>
            </div>
          </div>
          <div class="list-view__content" id="list-content"></div>
        </section>

        <!-- Library View -->
        <section class="library-view hidden" id="library-view">
          <div class="library-view__header">
            <h2 class="library-view__title">프롬프트 라이브러리</h2>
            <p class="library-view__subtitle">바로 복사해서 쓸 수 있는 실전 프롬프트 모음.</p>
            <div class="library-view__filters" id="lib-filters">
              <button class="lib-filter-pill is-active" data-cat="all">전체 <span class="lib-count" id="lib-count-all">2</span></button>
              <button class="lib-filter-pill" data-cat="업스케일">업스케일 <span class="lib-count">1</span></button>
              <button class="lib-filter-pill" data-cat="합성">합성 <span class="lib-count">1</span></button>
            </div>
          </div>
          <div class="library-view__content" id="lib-content">
          </div>
        </section>

        <!-- Input Bar -->
        <footer class="input-bar" id="input-bar">
          <div class="input-bar__inner">
                <input type="text" class="input-bar__initials" id="author-input" placeholder="TY" maxlength="3"
                  autocomplete="off" spellcheck="false" />
                <textarea id="prompt-input" class="input-bar__textarea" placeholder="여기에 프롬프트를 입력해주세요" rows="1"
                  maxlength="500" spellcheck="false"></textarea>
                <button type="button" class="input-bar__send" id="submit-btn" disabled aria-label="전송">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="19" x2="12" y2="5"></line>
                    <polyline points="5 12 12 5 19 12"></polyline>
                  </svg>
                </button>
          </div>
        </footer>
      </div>

      <!-- Login Modal -->
      <div class="login-modal" id="login-modal" aria-hidden="true">
        <div class="login-modal__backdrop" id="login-modal-backdrop"></div>
        <div class="login-modal__card">
          <button class="login-modal__close" id="login-modal-close" aria-label="닫기">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="6" x2="6" y2="18"></line>
              <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
          </button>
          <div class="login-modal__icon">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
              <circle cx="12" cy="7" r="4"></circle>
            </svg>
          </div>
          <h2 class="login-modal__title">로그인</h2>
          <p class="login-modal__subtitle">이니셜과 비밀번호를 입력해주세요</p>
          <div class="login-modal__form">
            <div class="login-modal__field">
              <label class="login-modal__label" for="login-id">아이디 (이니셜)</label>
              <input type="text" class="login-modal__input" id="login-id" placeholder="예: TY" maxlength="10" autocomplete="off" spellcheck="false" />
            </div>
            <div class="login-modal__field">
              <label class="login-modal__label" for="login-pw">비밀번호</label>
              <input type="password" class="login-modal__input" id="login-pw" placeholder="비밀번호 입력" maxlength="20" />
            </div>
            <p class="login-modal__error hidden" id="login-error">아이디 또는 비밀번호가 올바르지 않습니다.</p>
            <button class="login-modal__submit" id="login-submit">로그인</button>
          </div>
        </div>
      </div>

      <!-- Library Detail Modal -->
      <div class="lib-modal" id="lib-modal" aria-hidden="true">
        <div class="lib-modal__backdrop" id="lib-modal-backdrop"></div>
        <div class="lib-modal__sheet">
          <div class="lib-modal__header">
            <div class="lib-modal__tags" id="lib-modal-tags"></div>
            <div class="lib-modal__header-actions">
              <button class="lib-modal__edit-btn hidden" id="lib-modal-edit" aria-label="편집">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                  <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                </svg>
                편집
              </button>
              <button class="lib-modal__close" id="lib-modal-close" aria-label="닫기">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                  <line x1="18" y1="6" x2="6" y2="18"></line>
                  <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
              </button>
            </div>
          </div>
          <h3 class="lib-modal__title" id="lib-modal-title"></h3>
          <p class="lib-modal__desc" id="lib-modal-desc"></p>

          <!-- Admin Image Section -->
          <div class="lib-modal__images hidden" id="lib-modal-images">
            <div class="lib-modal__image-grid" id="lib-modal-image-grid"></div>
          </div>

          <!-- Read-only prompt -->
          <div class="lib-modal__prompt-wrap" id="lib-modal-prompt-wrap">
            <pre class="lib-modal__prompt" id="lib-modal-prompt"></pre>
          </div>

          <!-- Admin edit prompt (hidden by default) -->
          <div class="lib-modal__edit-wrap hidden" id="lib-modal-edit-wrap">
            <textarea class="lib-modal__edit-textarea" id="lib-modal-edit-textarea" rows="10"></textarea>
            <div class="lib-modal__edit-actions">
              <div class="lib-modal__edit-left">
                <label class="lib-modal__img-attach-btn" id="lib-modal-img-attach">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                    <circle cx="8.5" cy="8.5" r="1.5"></circle>
                    <polyline points="21 15 16 10 5 21"></polyline>
                  </svg>
                  이미지 첨부
                  <input type="file" accept="image/*" multiple class="lib-modal__img-input" id="lib-modal-img-input" />
                </label>
                <button class="lib-modal__thumb-btn" id="lib-modal-thumb-btn">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18"></rect>
                    <line x1="7" y1="2" x2="7" y2="22"></line>
                    <line x1="17" y1="2" x2="17" y2="22"></line>
                    <line x1="2" y1="12" x2="22" y2="12"></line>
                  </svg>
                  썸네일 생성
                </button>
              </div>
              <div class="lib-modal__edit-right">
                <button class="lib-modal__cancel-btn" id="lib-modal-cancel">취소</button>
                <button class="lib-modal__save-btn" id="lib-modal-save">저장</button>
              </div>
            </div>
          </div>

          <button class="lib-modal__copy-btn" id="lib-modal-copy">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
              <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
            </svg>
            프롬프트 복사하기
          </button>
        </div>
      </div>

      <!-- Firebase SDK (compat mode for file:// support) -->
      <script src="https://www.gstatic.com/firebasejs/12.13.0/firebase-app-compat.js"></script>
      <script src="https://www.gstatic.com/firebasejs/12.13.0/firebase-analytics-compat.js"></script>
      <script src="https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore-compat.js"></script>
      <script src="app.js"></script>
    </body>
</html>
