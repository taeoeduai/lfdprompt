<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="description" content="인더스트리얼 디자인 마스터클래스 워크샵 - AI 프롬프트" />
      <title>Prompt library | AI 프롬프트</title>
      <link rel="preconnect" href="https://fonts.googleapis.com" />
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
      <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
      <link rel="stylesheet" href="style.css" />
  </head>
    <body>
      <div class="page" id="page">
        <!-- Global Nav -->
        <nav class="global-nav" id="global-nav">
          <div class="global-nav__inner">
                <span class="global-nav__title" onclick="window.location.reload();">Prompt library</span>
                <div class="global-nav__links">
                  <button class="global-nav__link is-active" data-view="float" id="nav-float">대시보드</button>
                  <button class="global-nav__link" data-view="list" id="nav-list">리스트</button>
                  <button class="global-nav__link" data-view="library" id="nav-library">라이브러리</button>
                </div>
              </div>
        </nav>

        <!-- Floating Canvas -->
        <main class="canvas" id="canvas">
          <div class="canvas__bg" aria-hidden="true"></div>
        </main>

        <!-- List View -->
        <section class="list-view hidden" id="list-view">
          <div class="list-view__header">
            <div class="list-view__filters">
              <button class="filter-pill is-active" data-sort="newest" id="filter-newest">최신순</button>
              <button class="filter-pill" data-sort="oldest" id="filter-oldest">오래된순</button>
            </div>
          </div>
          <div class="list-view__content" id="list-content"></div>
        </section>

        <!-- Library View -->
        <section class="library-view hidden" id="library-view">
          <div class="library-view__header">
            <h2 class="library-view__title">프롬프트 라이브러리</h2>
            <p class="library-view__subtitle">바로 복사해서 쓸 수 있는 실전 프롬프트 모음.</p>
            <div class="library-view__filters">
              <button class="lib-filter-pill is-active">전체 <span class="lib-count">1</span></button>
              <button class="lib-filter-pill">리서치 <span class="lib-count">1</span></button>
              <button class="lib-filter-pill">기획 <span class="lib-count">1</span></button>
              <button class="lib-filter-pill">연출샷 <span class="lib-count">1</span></button>
              <button class="lib-filter-pill">PPT <span class="lib-count">1</span></button>
            </div>
          </div>
          <div class="library-view__content">
            <div class="lib-card">
              <div class="lib-card__tags">
                <span class="lib-tag lib-tag--primary">리서치</span>
                <span class="lib-tag">기획</span>
                <span class="lib-tag">연출샷</span>
                <span class="lib-tag">PPT</span>
              </div>
              <h3 class="lib-card__title">합성 이미지 만들기</h3>
              <p class="lib-card__desc">제품이나 서비스를 보여주기 위한 상황에 맞는 배경이나 소품이 포함된 자연스러운 합성 이미지를 만드는 프롬프트입니다.</p>
              <div class="lib-card__footer">0 복사</div>
            </div>
          </div>
        </section>

        <!-- Input Bar -->
        <footer class="input-bar" id="input-bar">
          <div class="input-bar__inner">
                <input type="text" class="input-bar__initials" id="author-input" placeholder="TY" maxlength="3"
                  autocomplete="off" spellcheck="false" />
                <textarea id="prompt-input" class="input-bar__textarea" placeholder="여기에 프롬프트를 입력해주세요" rows="1"
                  maxlength="500" spellcheck="false"></textarea>
                <button type="button" class="input-bar__send" id="submit-btn" disabled aria-label="전송">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="19" x2="12" y2="5"></line>
                    <polyline points="5 12 12 5 19 12"></polyline>
                  </svg>
                </button>
          </div>
        </footer>
      </div>

      <!-- Firebase SDK (compat mode for file:// support) -->
      <script src="https://www.gstatic.com/firebasejs/12.13.0/firebase-app-compat.js"></script>
      <script src="https://www.gstatic.com/firebasejs/12.13.0/firebase-analytics-compat.js"></script>
      <script src="https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore-compat.js"></script>
      <script src="app.js"></script>
    </body>
</html>
